; OBD Monitor AI — on-board unit firmware for ESP32-WROOM-32
;
; Build:   pio run -e esp32dev
; Flash:   pio run -e esp32dev --target upload
; Monitor: pio device monitor
;
; First-time provisioning (NVS + LittleFS certs):
;   See firmware/README.md → "Provisioning" section.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform    = espressif32@6.9.0
board       = esp32dev
framework   = arduino

; Partition table: min_spiffs gives ~1.9 MB for LittleFS (certs)
board_build.partitions    = min_spiffs.csv
board_build.filesystem    = littlefs

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    knolleary/PubSubClient@^2.8.0
    mikalhart/TinyGPSPlus@^1.0.3
    electroniccats/MPU6050@^1.3.0

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -DMQTT_MAX_PACKET_SIZE=2048
    -DMQTT_KEEPALIVE=60
    -DMQTT_SOCKET_TIMEOUT=10
