server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router: every path that doesn't match a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for versioned JS/CSS/asset bundles
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Minimal health probe endpoint (for Docker HEALTHCHECK / Caddy upstream checks)
    location = /nginx-health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
