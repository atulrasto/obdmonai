server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router: every path that doesn't match a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for versioned JS/CSS/asset bundles
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/* → FastAPI backend (works whether accessed via Caddy or directly)
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Minimal health probe endpoint (for Docker HEALTHCHECK / Caddy upstream checks)
    location = /nginx-health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
