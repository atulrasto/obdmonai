# pgbouncer.ini — reference config for obdmonai
# The edoburu/pgbouncer Docker image builds its own config from environment
# variables (DB_HOST, DB_USER, DB_PASSWORD, DB_NAME, POOL_MODE, etc.).
# This file is kept for documentation and can be mounted as an override if
# custom parameters are needed.

[databases]
obdmonai = host=db port=5432 dbname=obdmonai

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling is mandatory — SET LOCAL for RLS GUC leaks across
; connections in session mode; transaction mode isolates each txn correctly.
pool_mode = transaction

max_client_conn = 1000
default_pool_size = 25

; Disable prepared statements: transaction pooling re-routes connections, so
; server-side prepared statements break. asyncpg's prepare_threshold must also
; be set to None (or 0) in the application layer.
max_prepared_statements = 0

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
