# Mosquitto 2.x — TLS mutual-auth listener on 8883
# CA cert, server cert/key and device certs are generated by infra/mosquitto/gen-certs.sh
# and live in infra/mosquitto/certs/ (gitignored).

listener 8883
protocol mqtt

# TLS — require a valid client certificate signed by our CA
cafile  /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate true
# Use the cert's CN as the MQTT username so ACLs can reference the device identity.
use_identity_as_username true

# Do not allow anonymous connections; all clients must present a valid cert.
allow_anonymous false

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
