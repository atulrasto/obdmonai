# =============================================================================
# obdmonai — development Compose stack
#
#   docker compose up -d                # prod-shaped (no dev tools)
#   docker compose --profile dev up     # dev: + mailhog + simulator
#
# Exposed to host (localhost only):
#   MQTT TLS : DEV_MQTT_PORT   (default 8884  — avoids 8883 used by icumonai/energymonai)
#   Postgres : DEV_PG_PORT     (default 5434  — avoids 5432/5433)
#   API      : DEV_API_PORT    (default 8002  — avoids 8000/8001)
#   Caddy    : 80 / 443        (standard; only one stack active at a time)
#   Mailhog  : DEV_MAILHOG_SMTP 1027 / DEV_MAILHOG_WEB 8027
#   FleetView: DEV_FLEETVIEW_PORT 8020
# =============================================================================
name: obdmonai

x-backend: &backend
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: false
  restart: unless-stopped

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  mosquitto_data:

services:

  # ---------------------------------------------------------------------------
  # TimescaleDB — PG16 + hypertables + RLS
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb:2.17.2-pg16
    networks: [internal]
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${DEV_PG_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # migrate — one-shot; runs alembic upgrade head then exits
  # Connects DIRECTLY to TimescaleDB (bypasses pgbouncer — migrations must not
  # run through a transaction pooler).
  # ---------------------------------------------------------------------------
  migrate:
    <<: *backend
    restart: "no"
    networks: [internal]
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_SUPERUSER}:${POSTGRES_SUPERUSER_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # pgbouncer — transaction pooling; app/workers connect through here
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    networks: [internal]
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # mosquitto — MQTT broker, TLS on 8884 (avoids 8883 used by sibling stacks)
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    networks: [edge, internal]
    ports:
      - "${DEV_MQTT_PORT:-8884}:8883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # backend — FastAPI; internal only; Caddy proxies to it
  # ---------------------------------------------------------------------------
  backend:
    <<: *backend
    networks: [internal]
    ports:
      - "127.0.0.1:${DEV_API_PORT:-8002}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}
      DATABASE_URL_DIRECT: ""
      POSTGRES_SUPERUSER: ""
      POSTGRES_SUPERUSER_PASSWORD: ""
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # ingest — async MQTT subscriber → TimescaleDB hypertable writer
  # ---------------------------------------------------------------------------
  ingest:
    <<: *backend
    networks: [internal, edge]
    command: ["python", "-m", "app.ingest.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}
      POSTGRES_SUPERUSER: ""
      POSTGRES_SUPERUSER_PASSWORD: ""
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      mosquitto:
        condition: service_started

  # ---------------------------------------------------------------------------
  # frontend — React/Vite/TS SPA built with nginx (multi-stage Dockerfile)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # caddy — reverse proxy + auto-HTTPS
  # Proxies /api/* → backend:8000 (strips /api prefix)
  # Proxies everything else → frontend:80 (nginx)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2
    networks: [edge, internal]
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
      - "${HTTPS_HOST_PORT:-443}:443"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # mailhog — DEV ONLY: catches outbound SMTP; web UI at :8027, SMTP at :1027
  # (avoids 1025/8025 used by icumonai)
  # ---------------------------------------------------------------------------
  mailhog:
    profiles: ["dev"]
    image: mailhog/mailhog:latest
    networks: [internal]
    ports:
      - "127.0.0.1:${DEV_MAILHOG_SMTP:-1027}:1025"
      - "127.0.0.1:${DEV_MAILHOG_WEB:-8027}:8025"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # simulator — DEV ONLY: publishes realistic OBD/GPS telemetry over MQTT
  # ---------------------------------------------------------------------------
  simulator:
    profiles: ["dev"]
    build:
      context: ./backend
      target: simulator
    networks: [internal]
    env_file:
      - path: .env
        required: false
    depends_on:
      mosquitto:
        condition: service_started
    restart: unless-stopped
